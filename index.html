<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ECEFEA">
<title>Advait · MPSC + UPSC 2027 Command Center</title>
<style>
  :root{
    --paper:#ECEFEA; --surface:#F7F8F5; --surface-2:#FFFFFF;
    --ink:#19211C; --ink-soft:#5C655D; --ink-faint:#929B92;
    --line:#DBE0D9; --line-soft:#E7EBE5;
    --accent:#B96B2E; --accent-deep:#9A551F; --accent-soft:#F2E4D5; --accent-tint:#FAF3EB;
    --done:#4B7A68; --done-soft:#E2EDE7;
    --gov:#3A2E1E; --gov-deep:#241B10; --gov-gold:#9C7B3F; --gov-gold-soft:#EFE6D2; --gov-paper:#FBF8F1;
    --p1:#C98A4E; --p2:#B96B2E; --p3:#4B7A68; --p4:#2E5246;
    --learn:#C28A3C; --learn-soft:#F4E8D5; --revise:#5E83C4; --revise-soft:#E2E9F5;
    --shadow:0 1px 2px rgba(25,33,28,.04), 0 6px 20px rgba(25,33,28,.05);
    --shadow-lift:0 2px 6px rgba(25,33,28,.07), 0 14px 40px rgba(25,33,28,.10);
    --r:16px; --r-sm:11px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
    --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding-bottom:calc(76px + env(safe-area-inset-bottom));}
  .wrap{max-width:640px;margin:0 auto;}

  .topbar{position:sticky;top:0;z-index:40;background:rgba(236,239,234,.86);
    backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
    border-bottom:1px solid var(--line-soft);padding:calc(10px + env(safe-area-inset-top)) 18px 10px;}
  .topbar-row{display:flex;align-items:center;gap:10px;max-width:640px;margin:0 auto;}
  .brand{font-family:var(--serif);font-weight:600;font-size:16px;letter-spacing:.2px;flex:1;}
  .brand span{color:var(--accent);}
  input[type="date"]{font-family:var(--mono);font-size:12.5px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--line);border-radius:999px;padding:7px 12px;appearance:none;min-height:34px;}
  .btn-today{font-family:var(--sans);font-size:12.5px;font-weight:600;background:var(--ink);color:#fff;
    border:none;border-radius:999px;padding:8px 14px;min-height:34px;cursor:pointer;letter-spacing:.2px;}
  .btn-today:active{transform:scale(.96);}

  main{padding:18px 18px 28px;}
  .view{animation:fade .32s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);}
  h1.day{font-family:var(--serif);font-weight:600;font-size:29px;line-height:1.12;margin:6px 0 0;letter-spacing:.1px;}
  .section-title{font-family:var(--serif);font-weight:600;font-size:19px;margin:26px 0 12px;display:flex;align-items:baseline;gap:9px;}
  .section-title .num{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500;}

  .journey{margin-top:16px;}
  .journey-track{height:9px;border-radius:999px;background:var(--line-soft);display:flex;overflow:hidden;position:relative;}
  .journey-seg{height:100%;opacity:.9;}
  .journey-marker{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;background:#fff;
    border:3px solid var(--ink);transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(0,0,0,.18);z-index:2;transition:left .5s ease;}
  .journey-meta{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
  .journey-label{margin-top:10px;font-size:13px;color:var(--ink-soft);}
  .journey-label b{color:var(--ink);font-weight:600;}

  .card{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);}
  .card + .card{margin-top:12px;}
  .focus{background:var(--accent-tint);border:1px solid var(--accent-soft);}
  .focus .eyebrow{color:var(--accent-deep);}
  .focus-item{display:flex;gap:10px;padding:7px 0;border-top:1px dashed var(--accent-soft);}
  .focus-item:first-of-type{border-top:none;}
  .focus-tag{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-deep);min-width:74px;padding-top:2px;}
  .focus-text{font-size:14.5px;color:var(--ink);font-weight:500;}
  .ring-row{display:flex;align-items:center;gap:14px;margin-top:14px;}
  .ring{width:54px;height:54px;flex:none;}
  .ring-txt{font-family:var(--mono);font-size:13px;font-weight:600;}
  .ring-sub{font-size:12.5px;color:var(--ink-soft);}

  .day-note{font-size:12.5px;color:var(--ink-soft);margin:18px 0 10px;display:flex;align-items:center;gap:7px;}
  .day-note .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none;}
  .blocks{display:flex;flex-direction:column;gap:7px;}
  .blk{display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--line-soft);
    border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow);transition:opacity .2s;}
  .blk-bar{width:4px;flex:none;background:var(--ink-faint);}
  .blk-time{font-family:var(--mono);font-size:11.5px;color:var(--ink-soft);width:50px;flex:none;padding:12px 0 0 11px;font-weight:500;}
  .blk-body{flex:1;padding:11px 8px 11px 10px;min-width:0;}
  .blk-title{font-size:14px;font-weight:600;line-height:1.25;}
  .blk-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.3;}
  .blk-cat{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    margin-top:6px;padding:2px 7px;border-radius:6px;background:var(--line-soft);color:var(--ink-soft);}
  .blk-check{width:46px;flex:none;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--line-soft);cursor:pointer;}
  .checkbox{width:23px;height:23px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;transition:all .18s;background:var(--surface-2);}
  .checkbox svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:all .18s;color:#fff;}
  .blk.rest{opacity:.62;box-shadow:none;background:transparent;border-style:dashed;}
  .blk.rest .blk-title{font-weight:500;}
  .t-heavy .blk-bar{background:var(--accent);}.t-heavy .blk-cat{background:var(--accent-soft);color:var(--accent-deep);}
  .t-fixed .blk-bar{background:var(--ink);}.t-fixed .blk-cat{background:#E4E7E1;color:var(--ink);}
  .t-practice .blk-bar{background:var(--accent-deep);}.t-practice .blk-cat{background:var(--accent-soft);color:var(--accent-deep);}
  .t-test .blk-bar,.t-sim .blk-bar{background:var(--accent-deep);}
  .t-test,.t-sim{background:var(--accent-tint);border-color:var(--accent-soft);}
  .t-test .blk-cat,.t-sim .blk-cat{background:var(--accent);color:#fff;}
  .t-light .blk-bar{background:var(--ink-faint);}
  .t-recall .blk-bar{background:var(--done);}.t-recall .blk-cat{background:var(--done-soft);color:var(--done);}
  .t-gym .blk-bar{background:#8FA68C;}.t-gym .blk-cat{background:#E6EDE3;color:#5E7458;}
  .blk.done{background:var(--done-soft);border-color:#CFE0D7;}
  .blk.done .blk-title{color:var(--done);}.blk.done .blk-bar{background:var(--done);}
  .blk.done .checkbox{background:var(--done);border-color:var(--done);}
  .blk.done .checkbox svg{opacity:1;transform:scale(1);}

  .state-card{text-align:center;padding:34px 22px;}
  .state-card .big{font-family:var(--mono);font-size:46px;font-weight:600;color:var(--accent);line-height:1;margin:14px 0 4px;}
  .state-card .lead{font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:8px;}
  .state-card p{font-size:14px;color:var(--ink-soft);max-width:380px;margin:8px auto;}
  .pill-btn{display:inline-block;margin-top:14px;font-size:13.5px;font-weight:600;background:var(--ink);color:#fff;
    border:none;border-radius:999px;padding:11px 20px;cursor:pointer;}
  .pill-btn:active{transform:scale(.97);}

  .month-head{display:flex;align-items:flex-start;gap:12px;}
  .month-head .mh-main{flex:1;}
  .phase-badge{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;color:#fff;white-space:nowrap;}
  .theme{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink-soft);margin-top:4px;}
  .checkpoint{background:var(--surface);border:1px solid var(--line-soft);border-left:4px solid var(--accent);
    border-radius:var(--r-sm);padding:13px 15px;margin-top:16px;box-shadow:var(--shadow);}
  .checkpoint .eyebrow{color:var(--accent-deep);}
  .checkpoint .cp-text{font-size:14px;font-weight:600;margin-top:5px;line-height:1.35;}
  .subjects{font-size:13.5px;color:var(--ink-soft);margin-top:13px;line-height:1.5;}
  .subjects b{color:var(--ink);font-weight:600;}
  .week{border:1px solid var(--line-soft);border-radius:var(--r-sm);margin-top:9px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow);}
  .week-hd{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
  .week-hd .wk-label{font-weight:600;font-size:13.5px;flex:1;}
  .week-hd .wk-dates{font-family:var(--mono);font-size:11px;color:var(--ink-faint);}
  .week-hd .chev{width:9px;height:9px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);transform:rotate(45deg);transition:transform .25s;flex:none;}
  .week.open .chev{transform:rotate(-135deg);}
  .week.now .week-hd{background:var(--accent-tint);}
  .week.now .wk-label::after{content:"NOW";font-family:var(--sans);font-size:9px;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--accent);padding:2px 6px;border-radius:5px;margin-left:8px;vertical-align:middle;}
  .week-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
  .week.open .week-body{max-height:520px;}
  .week-inner{padding:2px 14px 14px;border-top:1px solid var(--line-soft);}
  .wk-row{display:flex;gap:9px;padding:8px 0;border-bottom:1px dashed var(--line-soft);}
  .wk-row:last-child{border-bottom:none;}
  .wk-tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);min-width:72px;padding-top:2px;}
  .wk-val{font-size:13px;color:var(--ink);flex:1;}
  .wk-special{background:var(--accent-tint);border:1px dashed var(--accent-soft);border-radius:8px;padding:7px 10px;margin-top:9px;font-size:12.5px;color:var(--accent-deep);font-weight:500;}

  .check-item{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line-soft);cursor:pointer;}
  .check-item:last-child{border-bottom:none;}
  .ci-box{width:21px;height:21px;border-radius:6px;border:2px solid var(--line);flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .18s;background:var(--surface-2);}
  .ci-box svg{width:12px;height:12px;opacity:0;color:#fff;transition:opacity .18s;}
  .check-item.done .ci-box{background:var(--done);border-color:var(--done);}
  .check-item.done .ci-box svg{opacity:1;}
  .check-item.done .ci-text{color:var(--ink-faint);text-decoration:line-through;}
  .ci-text{font-size:13.5px;line-height:1.4;}

  .countdown-card{text-align:center;background:var(--ink);color:#fff;border-radius:var(--r);padding:22px;box-shadow:var(--shadow-lift);}
  .countdown-card .cd-num{font-family:var(--mono);font-size:52px;font-weight:600;line-height:1;color:#fff;}
  .countdown-card .cd-num small{font-size:18px;color:var(--accent);}
  .countdown-card .cd-label{font-size:12.5px;color:#C7CDC6;letter-spacing:.05em;margin-top:6px;text-transform:uppercase;}
  .countdown-card .cd-date{font-family:var(--mono);font-size:12px;color:#9AA29A;margin-top:9px;}
  .phase-card{display:flex;gap:13px;padding:14px 15px;border:1px solid var(--line-soft);border-radius:var(--r-sm);background:var(--surface);margin-top:9px;box-shadow:var(--shadow);}
  .phase-dot{width:13px;height:13px;border-radius:50%;flex:none;margin-top:3px;}
  .phase-card .pc-main{flex:1;}
  .phase-card .pc-name{font-weight:600;font-size:14px;}
  .phase-card .pc-dates{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:1px;}
  .phase-card .pc-job{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.4;}
  .phase-card .pc-cp{font-size:11.5px;color:var(--accent-deep);margin-top:6px;font-weight:500;}
  .phase-status{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:6px;height:fit-content;}
  .ps-done{background:var(--done-soft);color:var(--done);}.ps-now{background:var(--accent);color:#fff;}.ps-next{background:var(--line-soft);color:var(--ink-faint);}
  .acc{border:1px solid var(--line-soft);border-radius:var(--r-sm);margin-top:9px;background:var(--surface);overflow:hidden;box-shadow:var(--shadow);}
  .acc-hd{display:flex;align-items:center;gap:10px;padding:14px 15px;cursor:pointer;}
  .acc-hd .ah-title{font-weight:600;font-size:14px;flex:1;}
  .acc-hd .chev{width:9px;height:9px;border-right:2px solid var(--ink-faint);border-bottom:2px solid var(--ink-faint);transform:rotate(45deg);transition:transform .25s;flex:none;}
  .acc.open .chev{transform:rotate(-135deg);}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
  .acc.open .acc-body{max-height:1600px;}
  .acc-inner{padding:0 15px 15px;border-top:1px solid var(--line-soft);}
  .acc-inner ol,.acc-inner ul{margin:12px 0 0;padding-left:20px;}
  .acc-inner li{font-size:13px;color:var(--ink-soft);margin-bottom:9px;line-height:1.45;}
  .acc-inner li b{color:var(--ink);}
  .mini-clock{display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line-soft);}
  .mini-clock:last-child{border-bottom:none;}
  .mc-time{font-family:var(--mono);font-size:11px;color:var(--ink-soft);width:48px;flex:none;padding-top:1px;}
  .mc-txt{font-size:12.5px;flex:1;}.mc-txt b{font-weight:600;}.mc-txt span{color:var(--ink-faint);font-size:11.5px;}
  .mock-form{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .mock-form input{font-family:var(--sans);font-size:13px;border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--surface-2);color:var(--ink);}
  .mock-form input.mf-name{flex:1;min-width:130px;}.mock-form input.mf-score{width:84px;}
  .mock-form button{font-size:13px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:9px 16px;cursor:pointer;}
  .mock-list{margin-top:12px;}
  .mock-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft);}
  .mock-row .mr-date{font-family:var(--mono);font-size:11px;color:var(--ink-faint);width:64px;flex:none;}
  .mock-row .mr-name{flex:1;font-size:13px;}
  .mock-row .mr-score{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent-deep);}
  .mock-row .mr-del{color:var(--ink-faint);cursor:pointer;font-size:16px;line-height:1;padding:0 4px;}
  .empty{font-size:12.5px;color:var(--ink-faint);text-align:center;padding:16px;font-style:italic;}
  .footnote{font-size:11.5px;color:var(--ink-faint);line-height:1.5;margin-top:18px;padding:14px;border-top:1px solid var(--line-soft);}
  .reset-btn{margin-top:12px;font-size:12px;color:var(--ink-faint);background:none;border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer;}

  /* ---------- SYLLABUS (gazette) ---------- */
  .gz-head{background:linear-gradient(180deg,var(--gov) 0%,var(--gov-deep) 100%);color:var(--gov-paper);
    border-radius:var(--r);padding:24px 20px 20px;text-align:center;position:relative;box-shadow:var(--shadow-lift);
    border:1px solid var(--gov-deep);}
  .gz-seal{width:60px;height:60px;margin:0 auto 12px;display:block;}
  .gz-emblem{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gov-gold);font-weight:700;}
  .gz-title{font-family:var(--serif);font-size:23px;font-weight:600;line-height:1.18;margin:8px 0 4px;color:#fff;}
  .gz-sub{font-size:11.5px;color:#D8CDB4;letter-spacing:.04em;line-height:1.5;}
  .gz-rule{width:54px;height:2px;background:var(--gov-gold);margin:14px auto 0;border-radius:2px;}
  .gz-foot{font-size:10px;color:#B7A988;margin-top:12px;letter-spacing:.03em;}

  .meter{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-top:12px;}
  .meter-top{display:flex;justify-content:space-between;align-items:baseline;}
  .meter-top .mt-l{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);}
  .meter-top .mt-r{font-family:var(--mono);font-size:12px;color:var(--ink-faint);}
  .meter-bar{height:10px;border-radius:999px;background:var(--line-soft);display:flex;overflow:hidden;margin-top:10px;}
  .meter-seg{height:100%;}
  .meter-seg.s-confident{background:var(--done);}
  .meter-seg.s-revised{background:var(--revise);}
  .meter-seg.s-learning{background:var(--learn);}
  .meter-legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;}
  .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);}
  .lg .sw{width:10px;height:10px;border-radius:3px;flex:none;}

  .syl-sec{margin-top:22px;}
  .syl-sec-hd{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:4px;}
  .syl-sec-tag{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--gov-gold-soft);color:var(--gov-gold);}
  .syl-sec-note{font-size:12px;color:var(--ink-faint);margin-bottom:10px;line-height:1.4;}

  .tile{border:1px solid var(--line-soft);border-radius:var(--r-sm);background:var(--surface);margin-top:10px;overflow:hidden;box-shadow:var(--shadow);}
  .tile-hd{display:flex;align-items:flex-start;gap:11px;padding:14px;cursor:pointer;}
  .tile-code{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent-deep);background:var(--accent-tint);border:1px solid var(--accent-soft);border-radius:7px;padding:3px 7px;flex:none;margin-top:1px;}
  .tile-main{flex:1;min-width:0;}
  .tile-name{font-weight:600;font-size:14px;line-height:1.3;}
  .tile-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center;}
  .owner{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:6px;}
  .owner.vision{background:#E4E7E1;color:var(--ink);}
  .owner.self{background:var(--accent-soft);color:var(--accent-deep);}
  .when{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);}
  .phase2{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--revise);background:var(--revise-soft);padding:3px 8px;border-radius:6px;}
  .tile-status{flex:none;align-self:center;}
  .stbtn{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:none;border-radius:7px;padding:7px 9px;cursor:pointer;white-space:nowrap;min-width:78px;text-align:center;}
  .st-none{background:var(--line-soft);color:var(--ink-faint);}
  .st-learning{background:var(--learn-soft);color:var(--learn);}
  .st-revised{background:var(--revise-soft);color:var(--revise);}
  .st-confident{background:var(--done-soft);color:var(--done);}
  .tile-body{max-height:0;overflow:hidden;transition:max-height .32s ease;}
  .tile.open .tile-body{max-height:900px;}
  .tile-inner{padding:0 14px 14px;border-top:1px solid var(--line-soft);}
  .tile-inner .official{font-size:12.5px;color:var(--ink-soft);line-height:1.55;margin-top:12px;}

  /* ---------- V3 · COMMAND CENTER ---------- */
  :root{
    --night:#10251E; --night-2:#173329; --lime:#D7E7A8; --signal:#E98042;
    --blue:#4F78A8; --blue-soft:#E3EBF3; --violet:#735D8C; --violet-soft:#ECE7F1;
  }
  body{background:
    radial-gradient(circle at 10% -10%,rgba(215,231,168,.26),transparent 30rem),
    linear-gradient(180deg,#E9EDE5 0,#F2F3EF 38rem,#ECEFEA 100%);
    min-height:100vh;}
  .wrap{max-width:720px;}
  .topbar{background:rgba(16,37,30,.94);border-bottom:1px solid rgba(255,255,255,.08);color:#fff;padding-top:calc(11px + env(safe-area-inset-top));}
  .topbar-row{max-width:720px;}
  .brand{font-family:var(--sans);font-size:14px;font-weight:760;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;}
  .brand::before{content:"A";display:grid;place-items:center;width:27px;height:27px;border-radius:9px;background:var(--signal);color:#fff;font-family:var(--serif);font-size:15px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);}
  .brand span{color:var(--lime);font-weight:600;}
  input[type="date"]{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#fff;color-scheme:dark;padding-inline:10px;}
  .btn-today{background:var(--lime);color:var(--night);padding-inline:12px;}
  main{padding:20px 16px 34px;}
  .eyebrow{color:#6F7B72;}
  h1.day{font-size:31px;letter-spacing:-.025em;}
  .card{background:rgba(255,255,255,.72);border-color:rgba(39,58,47,.08);box-shadow:0 1px 2px rgba(16,37,30,.04),0 12px 35px rgba(16,37,30,.045);}

  .command-hero{position:relative;overflow:hidden;border-radius:24px;padding:21px;background:
    radial-gradient(circle at 90% 0,rgba(215,231,168,.19),transparent 45%),
    linear-gradient(145deg,var(--night),var(--night-2));color:#fff;box-shadow:0 18px 48px rgba(16,37,30,.22);}
  .command-hero::after{content:"";position:absolute;width:150px;height:150px;border:1px solid rgba(215,231,168,.16);border-radius:50%;right:-70px;bottom:-86px;box-shadow:0 0 0 22px rgba(215,231,168,.035),0 0 0 44px rgba(215,231,168,.025);}
  .hero-top{display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1;}
  .hero-copy{flex:1;min-width:0;}
  .hero-kicker{font-size:10px;text-transform:uppercase;letter-spacing:.17em;color:var(--lime);font-weight:800;}
  .hero-title{font-family:var(--serif);font-size:25px;line-height:1.1;margin-top:7px;letter-spacing:-.015em;}
  .hero-sub{font-size:12px;color:#B7C6BC;margin-top:7px;line-height:1.45;}
  .hero-days{text-align:right;flex:none;}
  .hero-days strong{display:block;font-family:var(--mono);font-size:38px;line-height:.92;letter-spacing:-.06em;}
  .hero-days span{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#A9B9AF;}
  .hero-line{height:1px;background:rgba(255,255,255,.1);margin:17px 0 14px;}
  .hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:relative;z-index:1;}
  .hero-stat{padding:9px 10px;border-radius:11px;background:rgba(255,255,255,.055);}
  .hero-stat b{display:block;font-family:var(--mono);font-size:15px;color:#fff;}
  .hero-stat span{display:block;font-size:9px;color:#9FAFA5;text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}

  .mission-card{margin-top:13px;background:linear-gradient(135deg,#FFF7EE,#FFFDFC);border:1px solid #F1DCC8;border-radius:18px;padding:16px;box-shadow:var(--shadow);}
  .mission-row{display:flex;gap:12px;align-items:flex-start;}
  .mission-index{width:30px;height:30px;border-radius:10px;background:var(--signal);color:#fff;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;flex:none;}
  .mission-copy{flex:1;}
  .mission-copy .label{font-size:9.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#A85827;}
  .mission-copy .text{font-family:var(--serif);font-size:17px;font-weight:600;line-height:1.25;margin-top:3px;}
  .mission-copy .why{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}

  .checkin{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:13px;padding:14px 15px;border-radius:16px;background:rgba(255,255,255,.67);border:1px solid rgba(39,58,47,.08);}

  .energy button.active{background:#fff;color:var(--night);box-shadow:0 2px 7px rgba(16,37,30,.1);}
  .low-day-note{display:none;margin:10px 0 0;padding:10px 12px;border-radius:11px;background:var(--blue-soft);color:#34597E;font-size:12px;line-height:1.45;}
  .is-low .low-day-note{display:block;}
  .ess-card{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:12px 0;box-shadow:var(--shadow);}
  .ess-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .ess-head b{font-size:12.5px;}
  .ess-head span{font-size:9.5px;color:var(--ink-faint);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
  .ess-row{display:flex;align-items:center;gap:10px;padding:8px 2px;border-top:1px solid var(--line-soft);cursor:pointer;}
  .ess-time{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);min-width:40px;}
  .ess-name{flex:1;font-size:12.5px;}
  .ess-check{width:18px;height:18px;border:1.5px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;color:transparent;flex:0 0 18px;}
  .ess-check svg{width:12px;height:12px;}
  .ess-row.done .ess-check{background:var(--done);border-color:var(--done);color:#fff;}
  .ess-row.done .ess-name{color:var(--ink-faint);text-decoration:line-through;}
  .is-low .blk:not(.keystone):not(.rest){opacity:.34;}
  .is-low .ess-card{border-color:#E6B98E;}
  .blk.keystone{border-color:#E6B98E;box-shadow:0 0 0 1px rgba(233,128,66,.1),var(--shadow);}
  .blk.keystone .blk-title::after{content:"ESSENTIAL";font-size:8px;letter-spacing:.09em;color:#A85827;background:#F9E7D7;padding:2px 5px;border-radius:4px;margin-left:7px;vertical-align:2px;}

  .micro-title{display:flex;align-items:center;justify-content:space-between;margin:22px 1px 10px;}
  .micro-title h2{font-family:var(--serif);font-size:19px;margin:0;}
  .micro-title span{font-family:var(--mono);font-size:10px;color:var(--ink-faint);}
  .day-note{margin-top:0;}
  .blk{background:rgba(255,255,255,.72);border-radius:13px;}
  .blk-time{width:54px;}
  .blk-check{width:50px;}
  .checkbox{border-radius:50%;}

  .reflection{margin-top:18px;border-radius:18px;background:#fff;border:1px solid var(--line-soft);padding:16px;}
  .reflection-head{display:flex;align-items:center;justify-content:space-between;}
  .reflection-head b{font-family:var(--serif);font-size:16px;}
  .reflection-head span{font-size:10px;color:var(--ink-faint);}
  .reflection textarea{width:100%;min-height:76px;resize:vertical;margin-top:11px;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-family:var(--sans);font-size:13px;line-height:1.45;background:#F8F9F6;color:var(--ink);}
  .reflection-foot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
  .saved-state{font-size:10.5px;color:var(--done);opacity:0;transition:opacity .2s;}
  .saved-state.show{opacity:1;}
  .tiny-btn{border:0;background:var(--night);color:#fff;border-radius:9px;padding:8px 12px;font-size:11px;font-weight:700;cursor:pointer;}

  .dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;}
  .metric{background:#fff;border:1px solid var(--line-soft);border-radius:16px;padding:14px;min-height:105px;}
  .metric.wide{grid-column:1/-1;}
  .metric-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);font-weight:800;}
  .metric-value{font-family:var(--mono);font-size:27px;font-weight:650;letter-spacing:-.05em;margin-top:7px;}
  .metric-note{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.35;}
  .heatmap{display:grid;grid-template-columns:repeat(14,1fr);gap:5px;margin-top:12px;}
  .heat{aspect-ratio:1;border-radius:5px;background:#E2E6E0;}
  .heat.h1{background:#C8D8C5}.heat.h2{background:#8FAE99}.heat.h3{background:#4B7A68}.heat.h4{background:var(--night)}
  .heat-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--ink-faint);margin-top:5px;}
  .subject-bars{margin-top:11px;display:flex;flex-direction:column;gap:9px;}
  .sbar-row{display:grid;grid-template-columns:76px 1fr 30px;gap:8px;align-items:center;font-size:11px;}
  .sbar-track{height:7px;border-radius:99px;background:var(--line-soft);overflow:hidden;}
  .sbar-fill{height:100%;border-radius:99px;background:var(--signal);}
  .sbar-num{font-family:var(--mono);font-size:10px;color:var(--ink-faint);text-align:right;}
  .trend{width:100%;height:80px;margin-top:7px;}
  .trend-empty{font-size:12px;color:var(--ink-faint);padding:22px 0 8px;text-align:center;}
  .insight{display:flex;gap:10px;margin-top:10px;padding:11px;border-radius:12px;background:#F6F2E8;color:#6B542C;font-size:11.5px;line-height:1.4;}
  .insight::before{content:"↗";font-family:var(--mono);font-weight:700;}

  .tool-card{background:#fff;border:1px solid var(--line-soft);border-radius:16px;padding:15px;margin-top:10px;}
  .tool-card h3{font-size:14px;margin:0;}
  .tool-card p{font-size:11.5px;color:var(--ink-soft);margin:4px 0 12px;}
  .tool-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .soft-btn{border:1px solid var(--line);background:#F7F8F5;color:var(--ink);border-radius:9px;padding:9px 12px;font-size:11.5px;font-weight:700;cursor:pointer;}
  .soft-btn.danger{color:#A94F38;background:#FFF7F5;border-color:#F0D4CC;}
  .import-label{position:relative;overflow:hidden;}
  .import-label input{position:absolute;inset:0;opacity:0;cursor:pointer;}

  .nav{background:rgba(250,251,248,.94);padding-inline:4px;}
  .nav-btn{min-width:0;}
  .nav-btn .nb-label{font-size:9px;}
  .nav-btn.active{color:var(--signal);}
  .nav-btn.active svg{stroke-width:2.2;}
  .nav-btn[data-view="progress"].active{color:var(--done);}

  @media (max-width:390px){
    .brand span{display:none;}
    .hero-title{font-size:22px;}
    .hero-days strong{font-size:33px;}
    .hero-stats{gap:5px;}
    .hero-stat{padding:8px 7px;}
    .date-pick input{width:124px;}
  }
  @media (min-width:640px){
    main{padding-inline:22px;}
    .dash-grid{grid-template-columns:repeat(4,1fr);}
    .metric.wide{grid-column:span 2;}
  }

  /* ===== Intel dossier (scoped) ===== */

function buildDayBlocks(iso){
  const ph=getPhase(iso); if(!ph) return null;
  const wd=dow(iso), sun=wd===0, sat=wd===6;
  const m=getMonth(iso), wk=getWeek(m,iso);
  let base;
  if(ph.id==="p1"||ph.id==="p2") base= sun?CLOCK_CLASS_SUN:CLOCK_CLASS;
  else if(ph.id==="p3") base= sun?CLOCK_PRELIMS_SUN:CLOCK_PRELIMS;
  else base=CLOCK_TAPER;
  const out=base.map(b=>{const blk={...b}; if(b.slot&&wk&&wk[b.slot])blk.sub=wk[b.slot]; return blk;});
  if((ph.id==="p1"||ph.id==="p2")&&sat){
    const i=out.findIndex(b=>b.slot==="eveningRotation");
    if(i>=0) out[i]={t:out[i].t,title:"Week wrap — clear backlog + preview next week",sub:"Light close; the weekly test is Sunday morning",type:"heavy",cat:"Deep work"};
  }
  if(ph.id==="p3"&&sat){const i=out.findIndex(b=>b.slot==="mock"); if(i>=0) out[i].sub="Weekly full mock + thorough review";}
  return out;
}

function addDays(iso,n){const d=mkDate(iso);d.setDate(d.getDate()+n);return isoOf(d);}
function completionFor(iso){
  const blocks=buildDayBlocks(iso); if(!blocks)return{done:0,total:0,pct:0};
  const ticks=store.ticks[iso]||{}; let done=0,total=0;
  blocks.forEach((b,i)=>{if(TICKABLE.has(b.type)){total++;if(ticks[i])done++;}});
  return{done,total,pct:total?Math.round(done/total*100):0};
}
function streakAt(iso){
  if(iso<PLAN_START)return 0;
  let d=iso>EXAM?EXAM:iso,n=0;
  while(d>=PLAN_START){const c=completionFor(d);if(c.total&&c.pct>=50){n++;d=addDays(d,-1);}else break;}
  return n;
}
function syllabusScore(){
  const all=SYLLABUS.reduce((a,s)=>a.concat(s.areas),[]);
  const points=all.reduce((n,a)=>n+(store.syllabus[a.code]||0),0);
  return all.length?Math.round(points/(all.length*3)*100):0;
}

function scoreSparkline(){

function renderSubject(){
  const el=document.getElementById('iv-subject');
  const Y=SUBJMAT.years,M=SUBJMAT.matrix;
  const order=Object.keys(M).sort((a,b)=>sum(M[b])-sum(M[a]));
  const maxCell=Math.max(...order.flatMap(s=>M[s]));
  const hcls=v=>{if(!v)return'h0';const r=v/maxCell;return r>.75?'h4':r>.5?'h3':r>.25?'h2':'h1';};
  const head=`<tr><th></th>${Y.map(y=>`<th>${String(y).slice(2)}</th>`).join('')}<th>Σ</th><th>~/yr</th><th>trend</th></tr>`;
  const rows=order.map(s=>{
    const a=M[s],tot=sum(a);
    const recent=(a[7]+a[8]+a[9]+a[10]+a[11])/5, old=(a[0]+a[1]+a[2]+a[3]+a[4]+a[5]+a[6])/7;
    const tr=recent>old*1.25?'up':recent<old*.75?'down':'flat';
    const trl=tr==='up'?'▲ rising':tr==='down'?'▼ fading':'▬ stable';
    return `<tr><td class="lab">${esc(s)}</td>${a.map(v=>`<td class="cell ${hcls(v)}">${v||''}</td>`).join('')}<td class="cell" style="font-weight:700">${tot}</td><td class="cell">${(tot/12).toFixed(1)}</td><td><span class="trend ${tr}">${trl}</span></td></tr>`;
  }).join('');
  el.innerHTML=`
  <div class="eyebrow">Phases 2 · 3 · 9 — weightage & trends</div>
  <h1 class="big">Where the marks live</h1>
  <p class="lede">Question count per subject bucket per year. Darker = heavier. This is the map you allocate study hours against.</p>

    ${bloc('Polity & Governance','~16–17 q/yr · rising','Highest overlap with UPSC — ~90% covered by standard prep. Constitutional bodies (CAG, ECI, CIC), amendments, and fundamental rights are perennial. Cheap marks for a UPSC aspirant.','var(--A)')}
    ${bloc('Current Affairs','~13 q/yr · stable','Recurs by FORMAT, not fact: schemes, persons-in-news, awards, sports, reports. You cannot predict the fact, but you can drill the format and the last-12-months feed. Maharashtra CA is a reliable sub-bloc.','var(--B)')}
    ${bloc('Economy','~12 q/yr · stable','Five-Year Plans, poverty-estimation committees, inflation indices, population policy — a strikingly repetitive, almost static core. High predictability once the recurring committees/plans are memorised.','var(--A)')}
  </div>
  <h2 class="sec">Expected next-paper weightage</h2>
  <p class="lede">Projection from 2022–2026 means (not 12-yr, to weight the current pattern). Confidence reflects year-to-year variance.</p>
  <div class="card">${projTable()}</div>
  <h2 class="sec">Phase 9 \u2014 most-likely recurring topics</h2>
  <p class="lede">Forward projection from 2022\u201326 clusters: expected appearances per year and a confidence score from year-spread and recency. Not fact-prediction \u2014 pattern-prediction.</p>

}
function predTable(){
  return '<table class="tbl"><thead><tr><th>Topic</th><th class="num">Exp/yr</th><th class="num">Conf</th></tr></thead><tbody>'+
    PRED.map(p=>'<tr><td><span class="topic">'+esc(p.topic)+'</span>'+(p.mh==='Y'?'<span class="mhtag">MH</span>':'')+'<div class="sub-lab">'+esc(p.sub)+'</div></td><td class="num">'+p.exp+'</td><td class="num">'+p.conf+'%</td></tr>').join('')+
    '</tbody></table>';
}
function bloc(name,meta,body,col){return `<div style="padding:10px 0;border-top:1px solid var(--line-soft)"><div style="display:flex;align-items:baseline;gap:8px"><span style="width:9px;height:9px;border-radius:3px;background:${col};display:inline-block"></span><b>${name}</b><span class="sub-lab" style="margin-left:auto">${meta}</span></div><p class="callout">${body}</p></div>`;}
function sum(a){return a.reduce((x,y)=>x+y,0);}
function projTable(){
  const M=SUBJMAT.matrix;const order=Object.keys(M).sort((a,b)=>sum(M[b])-sum(M[a]));
  const rows=order.map(s=>{const a=M[s];const recent=(a[7]+a[8]+a[9]+a[10]+a[11])/5;
    const vals=[a[7],a[8],a[9],a[10],a[11]];const mean=recent;const sd=Math.sqrt(vals.reduce((n,v)=>n+(v-mean)**2,0)/5);
    const conf=sd<1.2?'High':sd<2.5?'Med':'Low';
    if(recent<0.5)return'';
    return `<tr><td>${esc(s)}</td><td class="num"><b>${Math.round(recent)}</b> <span class="sub-lab">±${Math.round(sd)}</span></td><td><span class="trend ${conf==='High'?'up':conf==='Low'?'down':'flat'}">${conf}</span></td></tr>`;}).join('');
  return `<table class="tbl"><thead><tr><th>Subject</th><th class="num">Expected q</th><th>Confidence</th></tr></thead><tbody>${rows}</tbody></table>`;

     '<td>'+r.act+'</td>'+
     '<td class="sub-lab">'+r.rev+'</td></tr>').join('');
   return '<tr><td colspan="6" style="background:var(--surface-2);font-weight:700;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);padding:7px 6px">'+g+'</td></tr>'+rows;
 }).join('');
 const tog=TOGSEP.map(t=>'<div class="goldbox"><span class="pill hot">'+t.tag+'</span> <b>'+t.b+'</b><div class="sub-lab" style="margin-top:4px">'+t.items+'</div></div>').join('');
 el.innerHTML='<div class="eyebrow">Maharashtra drilldown</div>'+
  '<h1 class="big">The Maharashtra add-on</h1>'+
  '<p class="lede">Roughly 12% of the paper and the biggest slice UPSC prep leaves uncovered. Domain-by-domain: priority, approximate load, UPSC overlap, source, action and revision rhythm.</p>'+
  '<div class="card"><div class="heat-wrap"><table class="tbl" style="min-width:640px"><thead><tr><th>Area</th><th>Pri</th><th class="num">Q/yr</th><th>UPSC overlap</th><th>Action</th><th>Revise</th></tr></thead><tbody>'+body+'</tbody></table></div>'+
  '<p class="warn">Q/yr are approximate historical averages from the flagged PYQs, not promises. "incl." = counted within its group total above.</p></div>'+
  '<h2 class="sec">Together vs separate</h2>'+
  '<p class="lede">Which blocks to learn once for both exams, which to layer a Maharashtra add-on onto, and which to keep separate.</p>'+
  '<div class="card">'+tog+'</div>';
}

/* ---------- intel sub-nav ---------- */
const VIEWS=['brief','method','rank','overlap','maha','subject','psych','resources','plan'];
const R={brief:renderBrief,method:renderMethod,rank:renderRank,overlap:renderOverlap,maha:renderMaha,subject:renderSubject,psych:renderPsych,resources:renderResources,plan:renderPlan};
let built={};
function ishow(v){
  VIEWS.forEach(n=>{var e=document.getElementById('iv-'+n);if(e)e.style.display=(n===v?'block':'none');});
  document.querySelectorAll('#view-intel .intel-nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.iv===v));
  if(!built[v]||v==='rank'){R[v]();built[v]=1;}
  window.scrollTo({top:0,behavior:'instant'});
}
let inited=false;
window.INTEL={init:function(){
  if(inited)return; inited=true;
  document.querySelectorAll('#view-intel .intel-nav-btn').forEach(b=>b.onclick=function(){ishow(b.dataset.iv);});
  renderBrief();built.brief=1;
}};

})();
</script>
